<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ClearPath Payer Portal — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #f0f4f8; display: flex;
           align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border: 1px solid #d0d9e4; border-radius: 6px;
            padding: 48px 40px; width: 400px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .logo { font-size: 22px; font-weight: bold; color: #1a3f6f; letter-spacing: -0.5px; }
    .logo span { color: #2e8b57; }
    .subtitle { color: #6b7e91; font-size: 13px; margin-top: 4px; margin-bottom: 36px; }
    label { display: block; font-size: 12px; color: #445566; font-weight: bold;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 20px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #c8d4df;
            border-radius: 4px; font-size: 14px; color: #1a2e3b; }
    input:focus { outline: none; border-color: #1a3f6f; }
    button { margin-top: 28px; width: 100%; padding: 12px;
             background: #1a3f6f; color: white; font-size: 14px;
             border: none; border-radius: 4px; cursor: pointer; letter-spacing: 0.3px; }
    button:hover { background: #163460; }
    .error { margin-top: 16px; color: #c0392b; font-size: 13px;
             background: #fdf0ee; padding: 10px 12px; border-radius: 4px; }
    .hint { margin-top: 20px; font-size: 12px; color: #8a9baa; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ClearPath<span>Rx</span></div>
    <div class="subtitle">Payer Authorization Portal — Provider Login</div>
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" id="username" autocomplete="username" required>
      <label>Password</label>
      <input type="password" name="password" id="password" autocomplete="current-password" required>
      <button type="submit">Sign In</button>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </form>
    <div class="hint">Demo credentials: provider_demo / Silna2024!</div>
  </div>
</body>
</html>
